<!DOCTYPE html> 
<html> 
<head> 
    <title>practical-13,05</title> 
    <link rel="stylesheet" href="mystyle-15.css"> 
</head> 
<body> 
    <div id="form"> 
        <h1>Registration Form</h1> 
        <form> 
            <label for="name">Name:</label><br> 
            <input type="text" name="name" id="name" placeholder="Enter your 
full name"><br><br> 
 
            <label for="ernum">Enrollment No.:</label><br> 
            <input type="text" name="ernum" id="ernum" placeholder="Enter your 
Er no."><br><br> 
 
            <label for="address">Address:</label><br> 
            <textarea rows="2" cols="30" id="address" name="address" 
placeholder="Residential Address"></textarea><br><br> 
 
            <label for="mobile">Mobile No.:</label><br> 
            <input type="tel" name="mobile" id="mobile" placeholder="Enter 
Mobile No." pattern="\d{10}"><br><br> 
 
            <label for="email">Email:</label><br> 
            <input type="email" name="email" id="email" placeholder="Enter 
your E-mail ID"><br><br> 
 
            <label for="gender">Gender:</label><br> 
            <input type="radio" name="gender" id="male" value="male"> 
            <label for="male">Male</label> 
            <input type="radio" name="gender" id="female" value="female"> 
            <label for="female">Female</label><br><br> 
 
            <label for="dob">Date of Birth:</label><br> 
            <input type="date" name="dob" id="dob"><br><br> 
 
            <button value="submit" id="button1" 
formaction="practical6exercise1.html" formmethod="get">Submit 1</button> 
 
            <button value="submit" id="button2" 
formaction="practical6exercise4.html" formmethod="post">Submit 2</button> 
        </form> 
    </div> 
</body> 
</html>
