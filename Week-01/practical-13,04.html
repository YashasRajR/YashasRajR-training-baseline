<!DOCTYPE html> 
<html> 
<head> 
    <title>practical-13,04</title> 
    <link rel="stylesheet" href="mystyle-14.css"> 
    <script src="https://kit.fontawesome.com/644332d412.js" 
crossorigin="anonymous"></script> 
</head> 
<body> 
    <div> 
    <form> 
        <fieldset> 
            <legend>Login Page</legend> 
        <label for="email">Email ID:</label><br><br> 
        <i class="fa-solid fa-envelope"></i> 
        <input type="email" name="email" id="email" placeholder="Enter your 
email id" required><br><br><br> 
 
        <label for="pwd">Password:</label><br><br> 
        <i class="fa-solid fa-lock"></i> 
        <input type="password" id="pwd" name="pwd" 
         pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
         title="Must contain at least one  number and one uppercase and 
lowercase letter, and at least 8 or more characters" 
         placeholder="Enter your password"><br><br> 
 
        <button value="submit" id="submit">Submit</button> 
 
        <button value="reset" id="clear">Reset</button> 
        </fieldset> 
    </form> 
    </div> 
</body> 
</html>
