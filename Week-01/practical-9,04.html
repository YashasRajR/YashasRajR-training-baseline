<body>
<form>
<lable for="email">Email</lable>
<input type="email" id="Email" name="Email" placeholder="Enter your email" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+[a-z]"autofocus><br>

<lable for="password">Password</lable>
<input type="password" id="password" name="password" placeholder="Enter your password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{6,8}"><br>

<button type="Submit" value="Submit">Submit</button>
</form>
</body>
</html>
