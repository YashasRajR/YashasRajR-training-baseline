<h1>CSS outline</h1>
<p>
An outline is a line that is drawn around elements, OUTSIDE the borders, to make the element "stand out".<br>
CSS has the following outline properties:<br>
1.outline-style<br>
2.outline-color<br>
3.outline-width<br>
4.outline-offset<br>
5.outline<br>
</p>
